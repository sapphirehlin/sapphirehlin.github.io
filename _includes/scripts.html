<script>
window.addEventListener('load', function() {
  document.querySelectorAll('.page__content a[href], .archive a[href]').forEach(function(a) {
    if (a.host !== window.location.host) {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    }
  });
});
</script>
